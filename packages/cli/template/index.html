<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LitMDX Docs</title>
    <script data-litmdx-theme-init>
      (function () {
        try {
          var s = localStorage.getItem('litmdx-theme');
          var dark = s === 'dark' || (!s && matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'dark';
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/.litmdx/app.tsx"></script>
  </body>
</html>
