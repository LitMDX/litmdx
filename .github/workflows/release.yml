name: Release & Publish

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type (patch | minor | major)"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Release & Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun run setup

      - name: Build packages
        run: bun run build:packages

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Bump versions
        run: |
          for pkg in packages/*/package.json; do
            npm version ${{ github.event.inputs.version_bump }} --no-git-tag-version --prefix "$(dirname $pkg)"
          done

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Publish to npm
        run: pnpm -r --filter './packages/*' publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "**/package.json"
          git commit -m "chore(release): bump versions [${{ github.event.inputs.version_bump }}]" || echo "Nothing to commit"
          git push
