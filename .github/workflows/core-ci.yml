name: core — CI

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/core/**"
      - ".github/workflows/core-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "packages/core/**"
      - ".github/workflows/core-ci.yml"

permissions:
  contents: read
  pull-requests: read

defaults:
  run:
    working-directory: packages/core

jobs:
  ci:
    name: Build, Lint, Format & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: core-dist
          path: packages/core/dist/
          retention-days: 7
