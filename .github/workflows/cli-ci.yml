name: cli — CI

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/cli/**"
      - ".github/workflows/cli-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "packages/cli/**"
      - ".github/workflows/cli-ci.yml"

permissions:
  contents: read
  pull-requests: read

defaults:
  run:
    working-directory: packages/cli

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Build @litmdx/core
        run: pnpm --filter @litmdx/core build
        working-directory: .

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: cli-dist
          path: packages/cli/dist/
          retention-days: 7
