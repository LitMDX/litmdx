name: cli — CI

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/cli/**"
      - ".github/workflows/cli-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "packages/cli/**"
      - ".github/workflows/cli-ci.yml"

permissions:
  contents: read
  pull-requests: read

defaults:
  run:
    working-directory: packages/cli

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Build @litmdx/core
        run: bun run build
        working-directory: packages/core

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: cli-dist
          path: packages/cli/dist/
          retention-days: 7
